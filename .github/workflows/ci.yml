name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libpam0g-dev \
            libdbus-1-dev \
            libwayland-dev \
            wayland-protocols

      - name: Install gtk4-layer-shell
        run: |
          sudo apt-get install -y meson ninja-build libgirepository1.0-dev gobject-introspection libgtk-4-dev
          git clone https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build -Dexamples=false -Ddocs=false -Dtests=false
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --workspace --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace
